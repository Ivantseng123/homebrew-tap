name: Auto-merge trusted formula bumps

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'Ivantseng123'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: Homebrew/actions/setup-homebrew@master
      - name: Identify formula/cask changes and audit
        id: audit
        run: |
          changed=$(gh pr view ${{ github.event.pull_request.number }} \
            --json files --jq '.files[].path' \
            | grep -E '^(Formula|Casks)/' || true)
          if [ -z "$changed" ]; then
            echo "No formula or cask changes; skipping auto-merge"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Homebrew 2024+ disabled `brew audit <path>`; we must audit by
          # `owner/tap/name`. Link the checked-out repo as a local tap so
          # the formula is resolvable by name.
          brew tap ivantseng123/tap "$PWD"
          for f in $changed; do
            name=$(basename "$f" .rb)
            echo "::group::Auditing ivantseng123/tap/$name ($f)"
            brew audit --strict --online "ivantseng123/tap/$name"
            echo "::endgroup::"
          done
          echo "ok=true" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Merge
        if: steps.audit.outputs.ok == 'true'
        run: gh pr merge ${{ github.event.pull_request.number }} --squash
        env:
          GH_TOKEN: ${{ github.token }}
